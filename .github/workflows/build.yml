name: Build Trainer

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[build]

      - name: Resolve package version
        id: meta
        shell: pwsh
        run: |
          $version = python -c "from palworld_trainer import __version__; print(__version__)"
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Build executable
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build.ps1 -Clean

      - name: Smoke test packaged executable
        run: powershell -ExecutionPolicy Bypass -File .\scripts\smoke_test_exe.ps1 -ExePath .\dist\PalworldTrainer.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: PalworldTrainer-v${{ steps.meta.outputs.version }}-windows
          path: dist/PalworldTrainer.exe
