name: Build Trainer

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[build]

      - name: Self check
        run: python -m palworld_trainer --self-check

      - name: Build executable
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build.ps1 -Clean

      - name: Smoke test packaged executable
        run: powershell -ExecutionPolicy Bypass -File .\scripts\smoke_test_exe.ps1 -ExePath .\dist\PalworldTrainer.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: PalworldTrainer-windows
          path: dist/PalworldTrainer.exe
