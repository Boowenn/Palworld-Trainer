name: Release Trainer

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[build]

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Package release
        run: powershell -ExecutionPolicy Bypass -File .\scripts\package_release.ps1 -Clean

      - name: Smoke test packaged executable
        run: powershell -ExecutionPolicy Bypass -File .\scripts\smoke_test_exe.ps1 -ExePath .\dist\PalworldTrainer.exe

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: PalworldTrainer-release
          path: release/*

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $notes = @"
          Palworld Trainer $tag

          傻瓜版 Palworld 修改器 — 下载 exe，双击运行，进游戏点按钮。

          Features:
          - 7 tabs: 主页 / 玩家 / 物品 / 帕鲁 / 科技 / 世界 / 设置
          - 1900+ items, 600+ pals, 500+ techs searchable and one-click give
          - 7 quick gift presets (starter kit, advanced materials, top gear, ammo, food, capture, tech points)
          - Auto-focus Palworld window and inject @! commands via Win32 SendInput
          - Bundled ClientCheatCommands catalogs — works even before the mod is installed
          - UE4SS bridge one-click deploy for optional diagnostics

          Requirements: UE4SS Experimental (Palworld) + ClientCheatCommands installed in your Palworld folder.
          "@
          gh release create $tag .\release\* --title "Palworld Trainer $tag" --notes $notes
