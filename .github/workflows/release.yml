name: Release Trainer

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[build]

      - name: Self check
        run: python -m palworld_trainer --self-check

      - name: Package release
        run: powershell -ExecutionPolicy Bypass -File .\scripts\package_release.ps1 -Clean

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: PalworldTrainer-release
          path: release/*

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $notes = @"
          Palworld Trainer $tag

          Included in this release:
          - Desktop shell with environment detection
          - UE4SS bridge deployment
          - Runtime diagnostics command pack
          - Host tools and command composer
          - Runtime bookmarks and session monitor
          - Node 24-ready CI workflows
          - Windows standalone packaging
          "@
          gh release create $tag .\release\* --title "Palworld Trainer $tag" --notes $notes
