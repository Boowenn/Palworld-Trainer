name: Release Trainer

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[build]

      - name: Resolve package version
        id: meta
        shell: pwsh
        run: |
          $version = python -c "from palworld_trainer import __version__; print(__version__)"
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Package release
        run: powershell -ExecutionPolicy Bypass -File .\scripts\package_release.ps1 -Clean

      - name: Smoke test packaged executable
        run: powershell -ExecutionPolicy Bypass -File .\scripts\smoke_test_exe.ps1 -ExePath .\dist\PalworldTrainer.exe

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: PalworldTrainer-v${{ steps.meta.outputs.version }}-release
          path: release/*

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $notes = @"
          幻兽帕鲁修改器 $tag

          本次版本重点：
          - 主界面继续朝参考修改器的点击式流程收敛，常用功能直接点，不再强迫玩家手输命令
          - 物品 / 帕鲁 / 科技页加入推荐分类、最近记录和收藏入口，默认就能傻瓜式操作
          - 大礼包和推荐项已按当前目录校准，过期条目会自动跳过，不再一整包失效
          - 头部 GitHub 入口和多余说明已移除，界面可见文案进一步汉化
          - 发布包内置增强模块资源并使用独立 exe 图标

          使用前提：请先在游戏目录安装 UE4SS 与聊天命令模组（CCC）。
          "@
          gh release create $tag .\release\* --title "幻兽帕鲁修改器 $tag" --notes $notes
