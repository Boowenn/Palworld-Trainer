[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "palworld-trainer"
version = "0.5.0"
description = "A staged desktop trainer shell for Palworld."
readme = "README.md"
requires-python = ">=3.12"
authors = [
  { name = "Boowenn" }
]
dependencies = []

[project.optional-dependencies]
build = ["pyinstaller>=6.10"]

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]
